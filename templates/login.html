{% extends "layout.html" %}

{% block title %}Login — AmpUp Skill{% endblock %}

{% block body %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon"><i class="fas fa-sign-in-alt"></i></span>
            <h1>Welcome Back</h1>
            <p>Log in to track your progress</p>
        </div>
        <form action="/login" method="post" class="auth-form">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Log In
            </button>
        </form>
        <p class="auth-footer">
            Don't have an account? <a href="/register">Sign Up</a>
        </p>
    </div>
</section>
{% endblock %}
